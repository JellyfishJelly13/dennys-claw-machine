<script>
// Custom JavaScript
$(window).on('load resize', function () {
    if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        $("body").addClass('mobile').removeClass('large-screen');
        $(".desktop").hide();
    }
    else {
        $(".desktop").show();
        $("body main").hide();
        $("body").addClass('large-screen').removeClass('mobile');
    }
});

document.onreadystatechange = function () {
    var state = document.readyState
    if (state == 'interactive') {
        document.getElementById('contents').style.visibility = "hidden";
    } else if (state == 'complete') {
        setTimeout(function () {
            document.getElementById('interactive');
            document.getElementById('load').style.visibility = "hidden";
            document.getElementById('contents').style.visibility = "visible";
        }, 500);
    }
}

function getParameterByName(name, url) {
    if (!url) {
        url = window.location.href;
    }
    name = name.replace(/[\[\]]/g, "\\$&");
    var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
        results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, " "));
}

// Form validation
$(document).ready(function(){
    jQuery.validator.addMethod(
        "regex",
        function(value, element, regexp) {
            if (regexp.constructor != RegExp)
                regexp = new RegExp(regexp);
            else if (regexp.global)
                regexp.lastIndex = 0;
            return this.optional(element) || regexp.test(value);
        },"invalid value."
    )

    document.getElementById("source").value = getParameterByName('source');
    document.getElementById("payee").value = getParameterByName('f');

    $('#registrationForm').validate({
        highlight: function (element) {
            $(element).parent().addClass("has-error");
        },
        unhighlight: function (element) {
            $(element).parent().removeClass("has-error");
        },
        rules: {
            firstName: {
                required: true,
                maxlength: 255
            },
            lastName: {
                required: true,
                maxlength: 255
            },
            email: {
                required: true,
                email: true,
                maxlength: 255,
                regex: /^[a-zA-Z0-9]+@[a-zA-Z0-9.]+\.[a-zA-Z]{2,4}$/
            },
        },
        messages:{
            firstName: "Please enter valid first name.",
            lastName: "Please enter valid last name.",
            email: "Please enter valid email.",
        },
        errorPlacement: function(error, element) {
            var placement = $(element).data('error');
            if (placement) {
                $(placement).append(error)
            } else {
                element.parent().append(error);
            }
        },
        submitHandler: function(form) {
            event.preventDefault();
            
            form.submit();
            
            setTimeout(function() {
                alert('Thank you! Your free plays have been sent to your email.');
                $(form)[0].reset();
            }, 500);
            
            return false;
        }
    });
})
</script>

</body>
